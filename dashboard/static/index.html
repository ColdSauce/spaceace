<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceAce Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10.19.3';
import { useState, useEffect, useRef, useCallback } from 'https://esm.sh/preact@10.19.3/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
import { renderFrame } from '/static/renderer.js';
const html = htm.bind(h);

// ── helpers ──────────────────────────────────────────────────────────────────
async function api(path, opts) { return (await fetch('/api' + path, opts)).json(); }
function Badge({ status }) { return html`<span class="badge badge-${status}">${status}</span>`; }
function fmtNum(n, d=1) { return n == null ? '-' : Number(n).toFixed(d); }
function fmtPct(n) { return n == null ? '-' : (n*100).toFixed(1)+'%'; }
function fmtBytes(b) { if (!b) return '-'; if (b<1024) return b+' B'; if (b<1048576) return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function fmtSteps(n) { if (!n) return '-'; if (n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if (n>=1e3) return (n/1e3|0)+'k'; return ''+n; }
function fmtDate(iso) { if (!iso) return '-'; const d=new Date(iso); return d.toLocaleString('en',{month:'short'})+' '+d.getDate(); }
function friendlyLevels(raw) { if (!raw) return '-'; const s=raw.replace(/[\[\]"]/g,'').trim(); if (s==='corridors') return 'Corridors'; if (s==='curriculum') return 'Curriculum'; return s; }

const AGENT_LABELS = { ppo:'PPO', hrl_pilot:'HRL Pilot', hrl_dqn:'HRL DQN', hrl_ppo:'HRL PPO', alphazero:'AlphaZero', unknown:'Other' };
const AGENT_DESC = { ppo:'Policy gradient (SB3)', hrl_pilot:'Hierarchical waypoint pilot', hrl_dqn:'HRL + DQN pilot', hrl_ppo:'HRL + PPO pilot', alphazero:'Self-play MCTS + neural net' };
function friendlyAgent(t) { return AGENT_LABELS[t]||t; }

const TAG_LABELS = { 'rollout/ep_rew_mean':'Reward','rollout/ep_len_mean':'Ep Length','episode/completed':'Completed','episode/crashed':'Crashed','episode/thrust_ratio':'Thrust','episode/pickups_collected':'Pickups','train/loss':'Loss','curriculum/stage':'Stage','curriculum/smoothed_win_rate':'Win Rate' };
function tagLabel(t) { return TAG_LABELS[t] || t.split('/').pop(); }
const CHART_COLORS = { 'rollout/ep_rew_mean':'#22d3ee','episode/completed':'#34d399','episode/crashed':'#f87171','rollout/ep_len_mean':'#a78bfa','train/loss':'#f87171','curriculum/stage':'#fbbf24','curriculum/smoothed_win_rate':'#34d399' };
const DEFAULT_TAGS = ['rollout/ep_rew_mean','episode/completed','episode/crashed','rollout/ep_len_mean','curriculum/stage','curriculum/smoothed_win_rate'];

// ── router ───────────────────────────────────────────────────────────────────
function useRoute() { const [h,s]=useState(location.hash||'#/'); useEffect(()=>{const f=()=>s(location.hash||'#/');addEventListener('hashchange',f);return()=>removeEventListener('hashchange',f)},[]);return h; }
function navigate(p){location.hash=p;}

// ── Nav ──────────────────────────────────────────────────────────────────────
function Nav({route}) {
    return html`<nav class="nav">
        <a href="#/" class="nav-title">SpaceAce</a>
        <span style="flex:1"></span>
        <span style="color:var(--text-dim);font-size:12px">Training Dashboard</span>
    </nav>`;
}

// ── Overview: type cards ─────────────────────────────────────────────────────
function Overview() {
    const [runs,setRuns]=useState([]); const [models,setModels]=useState([]); const [syncing,setSyncing]=useState(false); const [jobs,setJobs]=useState([]);
    const load=useCallback(async()=>{const[r,m,j]=await Promise.all([api('/runs'),api('/models'),api('/jobs')]);setRuns(r.runs||[]);setModels(m.models||[]);setJobs(j.jobs||[]);},[]);
    useEffect(()=>{load();},[load]);
    async function doSync(){setSyncing(true);await api('/runs/sync',{method:'POST'});await load();setSyncing(false);}

    const groups={};for(const r of runs){(groups[r.agent_type]||(groups[r.agent_type]=[])).push(r);}
    const bestModels={};for(const m of models)if(m.is_best||/^(best|final)/.test(m.filename))bestModels[m.agent_type]=(bestModels[m.agent_type]||0)+1;
    const runningJobs=jobs.filter(j=>j.status==='running');
    const order=['ppo','alphazero','hrl_pilot','hrl_ppo','hrl_dqn','unknown'];
    const sorted=Object.keys(groups).sort((a,b)=>(order.indexOf(a)<0?99:order.indexOf(a))-(order.indexOf(b)<0?99:order.indexOf(b)));

    return html`<div class="page">
        <div class="page-header">
            <h2>Model Types</h2>
            <div style="display:flex;gap:8px">
                ${runningJobs.length>0?html`<span class="badge badge-running">${runningJobs.length} training</span>`:null}
                <button class="btn" onClick=${doSync} disabled=${syncing}>${syncing?html`<span class="spinner"/>`:'Sync'}</button>
            </div>
        </div>
        <div class="type-grid">
            ${sorted.map(type=>{
                const tr=groups[type], total=tr.reduce((s,r)=>s+(r.total_timesteps||0),0);
                const lvls=[...new Set(tr.map(r=>friendlyLevels(r.levels)))];
                return html`<div class="type-card clickable" onClick=${()=>navigate('/type/'+type)}>
                    <div class="type-card-header"><h3>${friendlyAgent(type)}</h3><span style="color:var(--text-dim);font-size:12px">${tr.length} runs</span></div>
                    <p class="type-desc">${AGENT_DESC[type]||''}</p>
                    <div class="type-stats">
                        <div><span class="type-stat-label">Training</span><span class="type-stat-value">${fmtSteps(total)} steps</span></div>
                        <div><span class="type-stat-label">Levels</span><span class="type-stat-value">${lvls.join(', ')}</span></div>
                        <div><span class="type-stat-label">Models</span><span class="type-stat-value">${bestModels[type]||0}</span></div>
                    </div>
                </div>`;
            })}
        </div>
        ${sorted.length===0?html`<div class="card"><p style="padding:40px;text-align:center;color:var(--text-dim)">No runs. Click Sync.</p></div>`:null}
    </div>`;
}

// ── Shared: MetricChart ──────────────────────────────────────────────────────
function MetricChart({tag,data}){
    const ref=useRef(null),chart=useRef(null);
    useEffect(()=>{
        if(!ref.current||!data||!data.length)return;
        if(chart.current)chart.current.destroy();
        const c=CHART_COLORS[tag]||'#22d3ee';
        chart.current=new Chart(ref.current,{type:'line',data:{labels:data.map(d=>d.step),datasets:[{label:tag,data:data.map(d=>d.value),borderColor:c,backgroundColor:c+'20',borderWidth:1.5,pointRadius:0,fill:true,tension:0.3}]},options:{animation:false,responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9ca3af',maxTicksLimit:6},grid:{color:'#1f2937'}},y:{ticks:{color:'#9ca3af'},grid:{color:'#1f2937'}}}}});
        return()=>{if(chart.current)chart.current.destroy();};
    },[tag,data]);
    return html`<div class="chart-card"><h3>${tagLabel(tag)}</h3><canvas ref=${ref}/></div>`;
}

// ── Shared: editable notes ───────────────────────────────────────────────────
function EditableNotes({runId,initial}){
    const[editing,setEditing]=useState(false);const[value,setValue]=useState(initial||'');const[saved,setSaved]=useState(initial||'');
    async function save(){await api('/runs/'+runId+'/notes',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:value})});setSaved(value);setEditing(false);}
    if(editing)return html`<div class="notes-edit" onClick=${e=>e.stopPropagation()}><input class="notes-input" value=${value} onInput=${e=>setValue(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setValue(saved);setEditing(false);}}} autofocus placeholder="Add a note..."/><button class="btn btn-sm" onClick=${save}>Save</button></div>`;
    return html`<span class="notes-display" onClick=${e=>{e.stopPropagation();setEditing(true);}}>${saved||html`<span class="notes-placeholder">+ note</span>`}</span>`;
}

// ── Shared: GameCanvas (uses renderer.js from web/) ──────────────────────────
function GameCanvas({replay,frame}){
    const ref=useRef(null);
    useEffect(()=>{
        if(!ref.current||!replay)return;
        renderFrame(ref.current, replay, frame);
    },[replay,frame]);
    return html`<canvas ref=${ref} width="800" height="450" style="width:100%;border-radius:6px"/>`;
}

// ── TypePage: unified page per agent type ────────────────────────────────────
const TRAINER_MAP = { ppo:'ppo', hrl_pilot:'hrl_pilot', hrl_dqn:'hrl_pilot', hrl_ppo:'hrl_pilot', alphazero:'alphazero' };

// Opinionated training presets per agent type
const TRAINING_PRESETS = {
    ppo: [
        { id:'single_quick', label:'Single level (quick)', desc:'Train on one level, good for testing', trainer:'ppo', args:{level:0,timesteps:500000} },
        { id:'single_long', label:'Single level (full)', desc:'Longer single-level run for real results', trainer:'ppo', args:{level:0,timesteps:5000000} },
        { id:'curriculum', label:'Curriculum (recommended)', desc:'Progressive difficulty: generated maps → real levels. Advances when agent masters each stage.', trainer:'ppo_curriculum', args:{timesteps:10000000}, recommended:true },
        { id:'curriculum_short', label:'Curriculum (short)', desc:'Same progression, fewer total steps', trainer:'ppo_curriculum', args:{timesteps:2000000} },
    ],
    alphazero: [
        { id:'quick', label:'Quick run', desc:'50 iterations of self-play + training on one level', trainer:'alphazero', args:{level:0,iterations:50} },
        { id:'curriculum', label:'Curriculum (recommended)', desc:'Self-play across 50 generated levels, easy → hard', trainer:'alphazero', args:{iterations:200}, recommended:true },
    ],
    hrl_pilot: [
        { id:'corridors', label:'Corridor training (recommended)', desc:'Learn waypoint navigation on 100 generated corridor maps', trainer:'hrl_pilot', args:{levels:'4000-4099',timesteps:2000000}, recommended:true },
        { id:'corridors_long', label:'Corridor training (long)', desc:'Same maps, more training time', trainer:'hrl_pilot', args:{levels:'4000-4099',timesteps:5000000} },
    ],
    hrl_dqn: [
        { id:'corridors', label:'Corridor training (recommended)', desc:'Learn waypoint navigation on 100 generated corridor maps', trainer:'hrl_pilot', args:{levels:'4000-4099',timesteps:2000000}, recommended:true },
        { id:'corridors_long', label:'Corridor training (long)', desc:'Same maps, more training time', trainer:'hrl_pilot', args:{levels:'4000-4099',timesteps:5000000} },
    ],
    hrl_ppo: [
        { id:'corridors', label:'Corridor training (recommended)', desc:'Learn waypoint navigation on 100 generated corridor maps', trainer:'hrl_pilot', args:{levels:'4000-4099',timesteps:2000000}, recommended:true },
        { id:'corridors_long', label:'Corridor training (long)', desc:'Same maps, more training time', trainer:'hrl_pilot', args:{levels:'4000-4099',timesteps:5000000} },
    ],
};

const FIELD_LABELS = {level:'Level',levels:'Levels',timesteps:'Timesteps',action_repeat:'Action Repeat',obs:'Observation',reward:'Reward',iterations:'Iterations',games_per_iter:'Games/iter',num_sims:'MCTS Sims',max_steps:'Max Steps'};

function TypePage({type}) {
    const [tab,setTab]=useState('runs');
    const [runs,setRuns]=useState([]); const [models,setModels]=useState([]); const [jobs,setJobs]=useState([]);
    // Training
    const trainer=TRAINER_MAP[type]; const [launching,setLaunching]=useState(false);
    const [expandedJob,setExpandedJob]=useState(null); const [jobMetrics,setJobMetrics]=useState({});
    // Train preview
    const [trainReplay,setTrainReplay]=useState(null); const [trainFrame,setTrainFrame]=useState(0); const [trainPlaying,setTrainPlaying]=useState(false); const trainPlayRef=useRef(false); const [trainLoading,setTrainLoading]=useState(false); const trainLevelRef=useRef(null);
    // Watch
    const [watchForm,setWatchForm]=useState({level:0}); const [replay,setReplay]=useState(null); const [frame,setFrame]=useState(0); const [playing,setPlaying]=useState(false); const [speed,setSpeed]=useState(1); const [watchLoading,setWatchLoading]=useState(false); const [watchError,setWatchError]=useState(null); const playRef=useRef(false);
    // Live watch
    const [liveMode,setLiveMode]=useState(false); const liveModeRef=useRef(false); const [liveModelPath,setLiveModelPath]=useState(null); const [liveLevel,setLiveLevel]=useState(0); const [liveStats,setLiveStats]=useState({wins:0,crashes:0,truncated:0,episodes:0}); const [liveHistory,setLiveHistory]=useState([]);
    // Run detail
    const [selectedRun,setSelectedRun]=useState(null); const [metrics,setMetrics]=useState({}); const [allTags,setAllTags]=useState([]); const [shownTags,setShownTags]=useState(new Set(DEFAULT_TAGS));

    const load=useCallback(async()=>{
        const modelType=type.startsWith('hrl')?'hrl':type;
        const[r,m,j]=await Promise.all([api('/runs'),api('/models?agent_type='+modelType),api('/jobs')]);
        setRuns((r.runs||[]).filter(r=>r.agent_type===type));
        setModels(m.models||[]);
        setJobs((j.jobs||[]).filter(j=>j.trainer===(trainer||type)||j.trainer===type+'_curriculum'));
    },[type,trainer]);
    useEffect(()=>{load();},[load]);
    // poll running jobs
    useEffect(()=>{if(!jobs.some(j=>j.status==='running'))return;const t=setInterval(load,4000);return()=>clearInterval(t);},[jobs,load]);

    // Fetch metrics for expanded job — uses run_name directly, endpoint handles sync
    const loadJobMetrics=useCallback(async()=>{
        if(!expandedJob) return;
        const j=jobs.find(x=>x.id===expandedJob);
        if(!j||!j.progress||!j.progress.run_name) return;
        const md=await api('/metrics/by-run-name/'+encodeURIComponent(j.progress.run_name));
        setJobMetrics(md.tags||{});
    },[expandedJob,jobs]);
    useEffect(()=>{loadJobMetrics();},[loadJobMetrics]);
    // Live-refresh charts while running
    useEffect(()=>{
        if(!expandedJob)return;
        const j=jobs.find(x=>x.id===expandedJob);
        if(!j||j.status!=='running')return;
        const t=setInterval(loadJobMetrics,8000);
        return()=>clearInterval(t);
    },[expandedJob,jobs,loadJobMetrics]);

    // Deduplicate run labels
    const counts={},totals={},seen={};
    const numbered=runs.map(r=>{const k=(r.levels||'')+'|'+(r.total_timesteps||'');counts[k]=(counts[k]||0)+1;return{...r,_key:k};});
    for(const r of numbered)totals[r._key]=(totals[r._key]||0)+1;
    for(const r of numbered){seen[r._key]=(seen[r._key]||0)+1;r._num=totals[r._key]>1?seen[r._key]:null;}

    // Select run for chart
    function selectRun(r){
        setSelectedRun(r); setTab('runs');
        api('/runs/'+r.id+'/metrics').then(d=>{setMetrics(d.tags||{});setAllTags(Object.keys(d.tags||{}).sort());});
    }

    // Watch
    const [watchingModel,setWatchingModel]=useState(null); // path being watched
    async function doWatch(modelPath, level){
        setWatchLoading(true); setReplay(null); setWatchError(null); setWatchingModel(modelPath);
        const agentForWatch = type === 'hrl_pilot' ? 'hrl' : type === 'hrl_dqn' ? 'hrl' : type === 'hrl_ppo' ? 'hrl' : type;
        try {
            const resp=await api('/replay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_type:agentForWatch,level:parseInt(level)||0,max_steps:3000,model_path:modelPath||null})});
            if(resp.error){setWatchError(resp.error);}
            else if(resp.replay){setReplay(resp.replay);setFrame(0);setPlaying(true);}
        } catch(e) { setWatchError(String(e)); }
        setWatchLoading(false); setWatchingModel(null);
    }
    async function runWatch(e){
        e.preventDefault();
        doWatch(watchForm.model_path, watchForm.level);
    }
    useEffect(()=>{playRef.current=playing;},[playing]);
    useEffect(()=>{liveModeRef.current=liveMode;},[liveMode]);
    useEffect(()=>{
        if(!replay||!playing)return;let id;const iv=1000/(60*speed);let last=0;
        function tick(t){if(!playRef.current)return;if(t-last>=iv){last=t;setFrame(p=>{const n=p+1;if(n>=replay.frames.length){setPlaying(false);return replay.frames.length-1;}return n;});}id=requestAnimationFrame(tick);}
        id=requestAnimationFrame(tick);return()=>cancelAnimationFrame(id);
    },[replay,playing,speed]);

    // Live mode: when playback ends, wait briefly then fetch next episode
    useEffect(()=>{
        if(!liveModeRef.current||!replay||playing||watchLoading)return;
        if(frame<replay.frames.length-1)return;
        // Record stats for completed episode
        setLiveStats(s=>{const o=replay.outcome;return{wins:s.wins+(o==='completed'?1:0),crashes:s.crashes+(o==='crashed'?1:0),truncated:s.truncated+(o==='truncated'?1:0),episodes:s.episodes+1};});
        setLiveHistory(h=>[...h.slice(-49),{outcome:replay.outcome,steps:replay.total_steps,pickups:replay.pickups_initial.length-(replay.frames[replay.frames.length-1]||{}).pickups_remaining||0}]);
        // Fetch next episode after a brief pause
        const timer=setTimeout(()=>{if(liveModeRef.current)doWatch(liveModelPath,liveLevel);},1500);
        return()=>clearTimeout(timer);
    },[frame,replay,playing,watchLoading,liveModelPath,liveLevel]);

    function startLiveWatch(modelPath,level){
        setLiveMode(true);setLiveModelPath(modelPath);setLiveLevel(level);setLiveStats({wins:0,crashes:0,truncated:0,episodes:0});setLiveHistory([]);setSpeed(1);
        doWatch(modelPath,level);
    }
    function stopLiveWatch(){setLiveMode(false);setPlaying(false);}

    // Train preview: fetch replay using best model on current training level
    async function fetchTrainPreview(level){
        if(trainLoading)return;
        setTrainLoading(true);
        const agentForWatch = type === 'hrl_pilot' ? 'hrl' : type === 'hrl_dqn' ? 'hrl' : type === 'hrl_ppo' ? 'hrl' : type;
        try {
            const resp=await api('/replay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_type:agentForWatch,level:parseInt(level)||0,max_steps:3000,model_path:'models/curriculum/best_model.zip'})});
            if(resp.replay){setTrainReplay(resp.replay);setTrainFrame(0);setTrainPlaying(true);trainLevelRef.current=level;}
        } catch(e) {}
        setTrainLoading(false);
    }
    useEffect(()=>{trainPlayRef.current=trainPlaying;},[trainPlaying]);
    // Train preview playback at 2x speed
    useEffect(()=>{
        if(!trainReplay||!trainPlaying)return;let id;const iv=1000/(60*2);let last=0;
        function tick(t){if(!trainPlayRef.current)return;if(t-last>=iv){last=t;setTrainFrame(p=>{const n=p+1;if(n>=trainReplay.frames.length){setTrainPlaying(false);return trainReplay.frames.length-1;}return n;});}id=requestAnimationFrame(tick);}
        id=requestAnimationFrame(tick);return()=>cancelAnimationFrame(id);
    },[trainReplay,trainPlaying]);
    // Train preview auto-loop
    useEffect(()=>{
        if(!trainReplay||trainPlaying||trainLoading)return;
        if(trainFrame<trainReplay.frames.length-1)return;
        const j=jobs.find(x=>x.id===expandedJob);
        const lvl=(j&&j.progress&&j.progress.current_levels)?j.progress.current_levels[0]:trainLevelRef.current;
        if(lvl==null)return;
        const timer=setTimeout(()=>fetchTrainPreview(lvl),1000);
        return()=>clearTimeout(timer);
    },[trainFrame,trainReplay,trainPlaying,trainLoading,jobs,expandedJob]);
    // Auto-start preview when expanding a running job
    useEffect(()=>{
        if(!expandedJob)return;
        const j=jobs.find(x=>x.id===expandedJob);
        if(!j||j.status!=='running'||!j.progress||!j.progress.current_levels)return;
        fetchTrainPreview(j.progress.current_levels[0]);
    },[expandedJob]);
    // Stop preview when collapsing
    useEffect(()=>{if(!expandedJob){setTrainPlaying(false);setTrainReplay(null);}},[expandedJob]);

    function toggleTag(t){setShownTags(p=>{const n=new Set(p);n.has(t)?n.delete(t):n.add(t);return n;});}
    const visibleTags=allTags.filter(t=>shownTags.has(t));

    const tabs = [['runs','Runs'],['watch','Watch']];
    if(trainer) tabs.splice(1,0,['train','Train']);

    // Running jobs for this type
    const activeJobs=jobs.filter(j=>j.status==='running'||j.status==='pending');

    return html`<div class="page">
        <div class="page-header">
            <div><h2>${friendlyAgent(type)}</h2><p style="color:var(--text-dim);font-size:12px;margin-top:2px">${AGENT_DESC[type]||''}</p></div>
            <a href="#/" class="btn">Back</a>
        </div>

        <div class="tabs">
            ${tabs.map(([id,label])=>html`<button class=${'tab'+(tab===id?' tab-active':'')} onClick=${()=>setTab(id)}>${label}${id==='train'&&activeJobs.length?html` <span class="spinner" style="width:12px;height:12px"/>`:''}</button>`)}
        </div>

        ${tab==='runs'?html`
            ${!selectedRun?html`
                <div class="runs-list">
                    ${numbered.map(r=>html`
                        <div class="run-row clickable" onClick=${()=>selectRun(r)}>
                            <div class="run-row-main">
                                <span class="run-row-title">${friendlyLevels(r.levels)}${r._num?html` <span style="color:var(--text-dim)">#${r._num}</span>`:''}</span>
                                <span class="run-row-meta">${fmtSteps(r.total_timesteps)} / ${fmtDate(r.created_at)}</span>
                            </div>
                            <div class="run-row-metrics">
                                ${r.final_reward!=null?html`<span class="metric-pill" style="color:var(--accent)">reward ${fmtNum(r.final_reward,1)}</span>`:null}
                                ${r.final_completion!=null?html`<span class="metric-pill" style="color:var(--green)">compl ${fmtPct(r.final_completion)}</span>`:null}
                                ${r.final_crash!=null?html`<span class="metric-pill" style="color:var(--red)">crash ${fmtPct(r.final_crash)}</span>`:null}
                            </div>
                            <div class="run-row-notes"><${EditableNotes} runId=${r.id} initial=${r.notes}/></div>
                        </div>
                    `)}
                    ${runs.length===0?html`<div style="padding:30px;text-align:center;color:var(--text-dim)">No training runs yet${trainer?html` — go to the Train tab to start one`:''}</div>`:null}
                </div>
            `:html`
                <div>
                    <button class="btn btn-sm" style="margin-bottom:12px" onClick=${()=>setSelectedRun(null)}>Back to list</button>
                    <p style="margin-bottom:12px;color:var(--text-dim)">
                        ${friendlyLevels(selectedRun.levels)} / ${fmtSteps(selectedRun.total_timesteps)} steps / ${fmtDate(selectedRun.created_at)}
                        ${selectedRun.action_repeat?' / ar'+selectedRun.action_repeat:''}
                    </p>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
                        ${allTags.map(t=>html`<button class=${'btn btn-sm'} style=${shownTags.has(t)?'background:var(--accent-dim);color:white;border-color:var(--accent-dim)':''} onClick=${()=>toggleTag(t)}>${tagLabel(t)}</button>`)}
                    </div>
                    <div class="chart-grid">
                        ${visibleTags.map(t=>html`<${MetricChart} key=${t} tag=${t} data=${metrics[t]||[]}/>`)}
                    </div>
                    ${visibleTags.length===0?html`<p style="text-align:center;color:var(--text-dim);padding:30px">Select tags above</p>`:null}
                </div>
            `}
        `:null}

        ${tab==='train'&&trainer?html`
            <div class="preset-grid">
                ${(TRAINING_PRESETS[type]||[]).map(p=>html`
                    <div class=${'preset-card'+(p.recommended?' preset-recommended':'')}>
                        <div style="flex:1">
                            <div class="preset-label">${p.label}${p.recommended?html` <span style="color:var(--green);font-size:10px;vertical-align:middle">RECOMMENDED</span>`:''}</div>
                            <div class="preset-desc">${p.desc}</div>
                        </div>
                        <button class="btn btn-primary btn-sm" disabled=${launching} onClick=${()=>{
                            setLaunching(true);
                            api('/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({trainer:p.trainer,args:p.args})}).then(()=>{setLaunching(false);load();});
                        }}>${launching?'...':'Train'}</button>
                    </div>
                `)}
            </div>
            ${jobs.length>0?html`
                <div class="runs-list" style="margin-top:12px">
                    ${jobs.map(j=>{
                        const p=j.progress;
                        const isExpanded=expandedJob===j.id;
                        const chartTags=isExpanded?Object.keys(jobMetrics).filter(t=>DEFAULT_TAGS.includes(t)):[];
                        return html`
                        <div>
                        <div class="run-row clickable" onClick=${()=>{setExpandedJob(isExpanded?null:j.id);if(!isExpanded)setJobMetrics({});}}>
                            <div class="run-row-main">
                                <span class="run-row-title">${j.display_name}</span>
                                <span class="run-row-meta">
                                    ${p&&p.pct!=null?html`${p.pct}% — `:''}
                                    ${p&&p.total_timesteps?html`${fmtSteps(p.total_timesteps)}/${fmtSteps(p.target_timesteps)} steps`:j.started_at?fmtDate(j.started_at):'-'}
                                    ${p&&p.elapsed?html` / ${p.elapsed>60?fmtNum(p.elapsed/60,0)+'m':fmtNum(p.elapsed,0)+'s'}`:''}</span>
                            </div>
                            ${p?html`
                                <div class="run-row-metrics">
                                    ${p.stage!=null?html`<span class="metric-pill" style="color:var(--accent)">stage ${p.stage}/${p.total_stages||'?'}</span>`:null}
                                    ${p.win_rate!=null?html`<span class="metric-pill" style="color:${p.win_rate>=0.7?'var(--green)':'var(--text-dim)'}">win ${(p.win_rate*100).toFixed(0)}%</span>`:null}
                                    ${p.reward!=null?html`<span class="metric-pill" style="color:var(--accent)">reward ${fmtNum(p.reward,1)}</span>`:null}
                                    ${p.crashed!=null?html`<span class="metric-pill" style="color:${p.crashed>0?'var(--red)':'var(--text-dim)'}">crash ${p.crashed}</span>`:null}
                                </div>
                                ${p.current_levels?html`<div style="font-size:11px;color:var(--text-dim);margin-top:2px">
                                    Levels: [${p.current_levels.join(', ')}] / max_steps=${p.current_max_steps}
                                    ${p.conquered>0?html` — ${p.conquered} stage${p.conquered>1?'s':''} conquered`:''}
                                </div>`:null}
                            `:null}
                            <div style="display:flex;align-items:center;gap:6px">
                                <${Badge} status=${j.status}/>
                                ${j.status==='running'?html`<span class="spinner" style="width:12px;height:12px"/><button class="btn btn-sm" style="border-color:var(--red);color:var(--red)" onClick=${e=>{e.stopPropagation();api('/jobs/'+j.id+'/stop',{method:'POST'}).then(load);}}>Stop</button>`:null}
                            </div>
                        </div>
                        ${isExpanded?html`
                            <div style="padding:12px 16px;background:var(--bg);border-top:1px solid var(--border)">
                                ${trainReplay&&j.status==='running'?html`
                                    <div style="margin-bottom:12px">
                                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                                            <span style="color:var(--accent);font-weight:600;font-size:12px">LIVE PREVIEW</span>
                                            <span style="color:var(--text-dim);font-size:11px">Level ${trainLevelRef.current} @ 2x</span>
                                            ${trainLoading?html`<span class="spinner" style="width:10px;height:10px"/>`:null}
                                            ${trainReplay.outcome?html`<span style="font-size:11px;color:${trainReplay.outcome==='completed'?'var(--green)':trainReplay.outcome==='crashed'?'var(--red)':'var(--text-dim)'}">${trainReplay.outcome}</span>`:null}
                                        </div>
                                        <${GameCanvas} replay=${trainReplay} frame=${trainFrame}/>
                                    </div>
                                `:null}
                                ${chartTags.length>0?html`
                                    <div class="chart-grid">
                                        ${chartTags.map(t=>html`<${MetricChart} key=${t+'-'+((jobMetrics[t]||[]).length)} tag=${t} data=${jobMetrics[t]||[]}/>`)}
                                    </div>
                                `:html`<p style="color:var(--text-dim);text-align:center;padding:16px">${j.status==='running'?'Syncing metrics...':'No metric data available'}</p>`}
                            </div>
                        `:null}
                        </div>`;
                    })}
                </div>
            `:null}
        `:null}

        ${tab==='watch'?html`
            ${watchError?html`<div class="card" style="border-color:var(--red);margin-bottom:12px"><pre style="color:var(--red);font-size:12px;white-space:pre-wrap;word-break:break-word">${watchError}</pre></div>`:null}

            ${liveMode?html`
                <div class="card" style="display:flex;align-items:center;gap:16px;margin-bottom:12px;border-color:var(--accent-dim)">
                    <span style="color:var(--accent);font-weight:600;font-size:13px">LIVE</span>
                    <span style="color:var(--green);font-size:13px">W ${liveStats.wins}</span>
                    <span style="color:var(--red);font-size:13px">C ${liveStats.crashes}</span>
                    <span style="color:var(--text-dim);font-size:13px">T ${liveStats.truncated}</span>
                    <span style="color:var(--text-dim);font-size:12px">${liveStats.episodes} eps${liveStats.episodes>0?html` / ${(liveStats.wins/liveStats.episodes*100).toFixed(0)}% win`:''}</span>
                    <span style="flex:1"></span>
                    ${watchLoading?html`<span class="spinner" style="width:14px;height:14px"/>`:null}
                    <select class="btn btn-sm" value=${speed} onChange=${e=>setSpeed(+e.target.value)}><option value="1">1x</option><option value="2">2x</option><option value="4">4x</option><option value="8">8x</option><option value="16">16x</option></select>
                    <button class="btn btn-sm" style="border-color:var(--red);color:var(--red)" onClick=${stopLiveWatch}>Stop</button>
                </div>
                ${liveHistory.length>0?html`
                    <div style="display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap">
                        ${liveHistory.map((h,i)=>html`<div style=${'width:10px;height:10px;border-radius:2px;background:'+(h.outcome==='completed'?'var(--green)':h.outcome==='crashed'?'var(--red)':'var(--text-dim)')} title=${'Ep '+(i+1)+': '+h.outcome+' ('+h.steps+' steps, '+h.pickups+' pickups)'}/>`)}
                    </div>
                `:null}
            `:null}

            ${replay?html`
                <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow:hidden">
                    <${GameCanvas} replay=${replay} frame=${frame}/>
                </div>
                <div class="card" style="display:flex;align-items:center;gap:12px;margin-top:8px;margin-bottom:16px">
                    <button class="btn btn-sm" onClick=${()=>setPlaying(!playing)}>${playing?'Pause':'Play'}</button>
                    <button class="btn btn-sm" onClick=${()=>{setFrame(0);setPlaying(false);}}>Reset</button>
                    <input type="range" min="0" max=${replay.frames.length-1} value=${frame} onInput=${e=>{setFrame(+e.target.value);setPlaying(false);}} style="flex:1"/>
                    <span style="color:var(--text-dim);font-size:12px;white-space:nowrap">${frame+1}/${replay.frames.length}</span>
                    ${!liveMode?html`<select class="btn btn-sm" value=${speed} onChange=${e=>setSpeed(+e.target.value)}><option value="0.25">0.25x</option><option value="0.5">0.5x</option><option value="1">1x</option><option value="2">2x</option><option value="4">4x</option></select>`:null}
                    <${Badge} status=${replay.outcome}/>
                    <span style="color:var(--text-dim);font-size:12px;white-space:nowrap">pickups ${replay.pickups_initial.length-(replay.frames[frame]||{}).pickups_remaining||0}/${replay.pickups_initial.length}</span>
                </div>
            `:null}

            ${!liveMode?html`
                ${models.length>0?html`
                    <div class="card-title" style="margin-bottom:8px">Models</div>
                    <div class="runs-list">
                        ${models.filter(m=>m.is_best||/^(best|final)/.test(m.filename)).map(m=>{
                            const modelPath=m.path.replace(/\.(zip|pt|onnx)$/,'');
                            const levelLabel=m.level||'root';
                            const isLoading=watchLoading&&watchingModel===modelPath;
                            return html`
                                <div class="run-row">
                                    <div class="run-row-main">
                                        <span class="run-row-title">${m.filename.replace(/\.(zip|pt|onnx)$/,'')}${m.is_best?html` <span style="color:var(--green);font-size:11px">BEST</span>`:''}</span>
                                        <span class="run-row-meta">level ${levelLabel} / ${fmtBytes(m.file_size_bytes)} / ${m.file_type}</span>
                                    </div>
                                    <div class="form-group" style="flex-direction:row;align-items:center;gap:6px" onClick=${e=>e.stopPropagation()}>
                                        <label style="margin:0;font-size:11px">Lvl</label>
                                        <input type="number" value=${m._watchLevel!=null?m._watchLevel:(m.level||0)} style="width:60px;padding:3px 6px;font-size:12px"
                                            id=${'mlvl-'+m.id}
                                            onInput=${e=>{m._watchLevel=e.target.value;}} />
                                        <button class="btn btn-sm btn-primary" disabled=${watchLoading} onClick=${()=>{
                                            const lvlInput=document.getElementById('mlvl-'+m.id);
                                            doWatch(modelPath, lvlInput?lvlInput.value:(m.level||0));
                                        }}>
                                            ${isLoading?html`<span class="spinner" style="width:12px;height:12px"/>`:'Watch'}
                                        </button>
                                        <button class="btn btn-sm" style="border-color:var(--accent-dim);color:var(--accent)" disabled=${watchLoading} onClick=${()=>{
                                            const lvlInput=document.getElementById('mlvl-'+m.id);
                                            startLiveWatch(modelPath, lvlInput?lvlInput.value:(m.level||0));
                                        }}>Live</button>
                                    </div>
                                </div>`;
                        })}
                    </div>
                `:null}

                <div class="card" style="margin-top:16px">
                    <div class="card-title">No model (raw agent)</div>
                    <form onSubmit=${runWatch}>
                        <div class="form-row">
                            <div class="form-group"><label>Level</label><input type="number" value=${watchForm.level} style="width:80px" onInput=${e=>setWatchForm({...watchForm,level:e.target.value})}/></div>
                            <button type="submit" class="btn btn-primary btn-sm" disabled=${watchLoading}>${watchLoading&&!watchingModel?html`<span class="spinner" style="width:12px;height:12px"/> Running...`:'Watch without model'}</button>
                        </div>
                    </form>
                </div>
            `:null}
        `:null}
    </div>`;
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
    const route=useRoute();
    let page;
    if(route.startsWith('#/type/')){
        page=html`<${TypePage} type=${decodeURIComponent(route.split('/')[2])}/>`;
    } else {
        page=html`<${Overview}/>`;
    }
    return html`<${Nav} route=${route}/>${page}`;
}
render(html`<${App}/>`,document.getElementById('app'));
</script>
</body>
</html>
